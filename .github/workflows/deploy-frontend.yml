# ============================================================
# Deploy Frontend — Vercel
#
# Ce workflow déploie le frontend React/Vite sur Vercel.
# Vercel gère automatiquement le CI/CD si le repo GitHub est
# connecté via vercel.com (approche recommandée, sans ce fichier).
# Ce workflow sert d'alternative si tu préfères le contrôle CLI.
#
# SECRETS GitHub à configurer (Settings → Secrets → Actions) :
#   VERCEL_TOKEN      → token Vercel (vercel.com → Settings → Tokens)
#   VERCEL_ORG_ID     → ton org ID Vercel (vercel.com → Settings)
#   VERCEL_PROJECT_ID → l'ID du projet Vercel (dans .vercel/project.json
#                       après avoir lié le projet avec `vercel link`)
#
# VARIABLE d'environnement à configurer sur vercel.com :
#   VITE_API_URL = https://sma-backend-8361.azurewebsites.net
# ============================================================

name: Deploy Frontend (Vercel)

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Vercel

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Déploiement Vercel ─────────────────────────────────────────
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
