# ============================================================
# Deploy Frontend — Azure Static Web Apps
#
# Ce workflow :
#   1. Installe les dépendances npm
#   2. Build l'application React/Vite avec VITE_API_URL injecté
#   3. Déploie le dossier dist/ sur Azure Static Web Apps
#
# SECRETS GitHub à configurer (Settings → Secrets → Actions) :
#   AZURE_STATIC_WEB_APPS_API_TOKEN → token d'API Static Web Apps
#                                      (récupéré dans le portail Azure)
#   VITE_API_URL                    → URL du backend Azure
#                                      ex: https://sma-backend.azurewebsites.net
#
# RESSOURCE AZURE à créer au préalable :
#   Azure Static Web Apps (plan Free suffit pour un PFE)
#   - Framework preset : React
#   - App location     : /frontend
#   - Output location  : dist
# ============================================================

name: Deploy Frontend (Azure Static Web Apps)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Déploiement (push ou PR ouverte) ────────────────────────────────────
  deploy:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configuration Node.js ─────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      # ── 3. Installation des dépendances npm ──────────────────────────
      - name: Install npm dependencies
        working-directory: frontend
        run: npm install

      # ── 4. Build Vite avec injection de VITE_API_URL ─────────────────
      - name: Build React application
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── 5. Déploiement sur Azure Static Web Apps ─────────────────────
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/frontend'
          output_location: 'dist'
          skip_app_build: true

  # ── Fermeture de la preview PR (PR fermée) ───────────────────────────────
  close_pr_environment:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview Environment

    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
