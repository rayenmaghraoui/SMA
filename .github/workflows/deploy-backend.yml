# ============================================================
# Deploy Backend — Azure Web App for Containers
#
# Ce workflow :
#   1. Build l'image Docker du backend
#   2. La pousse sur GitHub Container Registry (ghcr.io)
#   3. Déploie l'image sur Azure Web App (Linux, Containers)
#
# Pourquoi Azure Web App et non Function App ?
#   Les dépendances ML lourdes (sentence-transformers ~300 Mo,
#   ChromaDB) dépassent les limites du plan Consommation Azure
#   Functions. Azure Web App for Containers n'a pas ces limites.
#
# SECRETS GitHub à configurer (Settings → Secrets → Actions) :
#   AZURE_CREDENTIALS   → JSON du Service Principal (az ad sp create-for-rbac --sdk-auth)
#   AZURE_WEBAPP_NAME   → nom du Web App Azure (sma-backend-8361)
#   GHCR_PAT            → GitHub PAT avec read:packages (pour que Azure pull depuis ghcr.io)
#
# RESSOURCES AZURE à créer au préalable :
#   1. Azure Web App (Linux) — taille B2 minimum (2 vCPU / 3.5 Go RAM)
#      Configuration : "Docker Container" comme stack de publication
#   2. Aucun Azure Container Registry nécessaire (ghcr.io est gratuit)
# ============================================================

name: Deploy Backend (Azure Web App for Containers)

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'requirements.txt'
      - 'backend/Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout du code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Connexion à GitHub Container Registry ───────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Extraire les métadonnées Docker ─────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 4. Setup Docker Buildx ────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Build et push de l'image Docker ────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── 6. Login Azure via Service Principal ──────────────────────────
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 7. Déploiement — mise à jour image container ──────────────────
      - name: Deploy container to Azure Web App
        run: |
          az webapp config container set \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group sma-pfe-rg \
            --container-image-name ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --container-registry-url https://${{ env.REGISTRY }} \
            --container-registry-user ${{ github.actor }} \
            --container-registry-password ${{ secrets.GHCR_PAT }}

      # ── 8. Redémarrer le Web App pour pull la nouvelle image ──────────
      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group sma-pfe-rg

      # ── 9. Vérification du déploiement ─────────────────────────────────
      - name: Verify deployment
        run: |
          echo "✅ Image deployed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "🌐 App URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
          echo "📋 Health check: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/health"
