# ============================================================
# Nginx config — AI Business Consultant Frontend
# Sert les fichiers statiques React et proxifie /api → backend
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Répertoire des fichiers statiques React
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------
    # Gzip — compresser les assets JS/CSS pour des temps de
    # chargement plus rapides
    # --------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # --------------------------------------------------------
    # Proxy vers l'API backend
    # Toutes les requêtes /api/* sont redirigées vers le service
    # "backend" sur le réseau Docker interne (port 8000)
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;

        # Headers nécessaires pour le SSE (Server-Sent Events / streaming)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Headers standards
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # SPA React — renvoyer index.html pour toutes les routes
    # (React Router gère le routing côté client)
    # --------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------
    # Cache des assets statiques (JS, CSS, images)
    # --------------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --------------------------------------------------------
    # Sécurité — headers HTTP
    # --------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
