# ============================================================
# docker-compose.yml — AI Business Consultant
# Lance les services : backend (FastAPI) + frontend (React/Nginx)
#
# Prérequis : fichier .env à la racine du projet avec :
#   AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_MODEL
#
# Lancement :
#   docker-compose up --build
#
# Accès :
#   Frontend : http://localhost:5173
#   Backend  : http://localhost:8000
#   Docs API : http://localhost:8000/docs
# ============================================================

services:

  # ----------------------------------------------------------
  # SERVICE 1 : Backend — FastAPI + LangGraph + ChromaDB
  # LLM cloud : DeepSeek-V3.2 via Azure AI Foundry (.env)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: sma_backend
    image: sma-backend:latest

    ports:
      - "8000:8000"

    environment:
      # LLM — Azure AI Foundry (DeepSeek-V3.2)
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_MODEL=${AZURE_OPENAI_MODEL:-DeepSeek-V3.2}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}

      # Embeddings
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/sentence-t5-base}

      # Chemins internes au conteneur
      - DATA_DIR=/app/data
      - DOCUMENTS_DIR=/app/documents
      - CHROMA_DB_PATH=/app/backend/rag/chroma_db
      - UPLOADS_DIR=/app/data/uploads

      # RAG
      - RAG_CHUNK_SIZE=${RAG_CHUNK_SIZE:-500}
      - RAG_CHUNK_OVERLAP=${RAG_CHUNK_OVERLAP:-50}
      - RAG_TOP_K=${RAG_TOP_K:-3}

      # API
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FRONTEND_URL=http://localhost:5173

      # Environnement
      - DEBUG=${DEBUG:-false}

    env_file:
      - .env

    volumes:
      - chroma_data:/app/backend/rag/chroma_db
      - uploads_data:/app/data/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - sma_network

    restart: unless-stopped

  # ----------------------------------------------------------
  # SERVICE 4 : Frontend — React 18 + Vite (servi par Nginx)
  # ----------------------------------------------------------
  # SERVICE 2 : Frontend — React 18 + Vite (servi par Nginx)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: sma_frontend
    image: sma-frontend:latest

    ports:
      - "5173:80"

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - sma_network

    restart: unless-stopped


# ============================================================
# VOLUMES — persistence entre les redémarrages
# ============================================================

volumes:
  chroma_data:
    driver: local

  uploads_data:
    driver: local


# ============================================================
# RÉSEAU — communication interne entre les services
# ============================================================

networks:
  sma_network:
    driver: bridge
    name: sma_network
